services:
  # ── Backend API ────────────────────────────────────────────────────────────
  - type: web
    name: samson-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      # Nhost PostgreSQL — set the real password in Render dashboard
      - key: DATABASE_URL
        value: postgres://postgres:[YOUR-PASSWORD]@oncujptgtbayawpovvgv.db.eu-central-1.nhost.run:5432/oncujptgtbayawpovvgv
      - key: SERVER_PORT
        value: 8080
      - key: JWT_SECRET
        generateValue: true
      - key: MIGRATIONS_PATH
        value: /app/internal/database/migrations
      - key: ALLOWED_ORIGINS
        value: https://samson-frontend.onrender.com

  # ── Frontend ───────────────────────────────────────────────────────────────
  - type: web
    name: samson-frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://samson-backend.onrender.com/api/v1
      - key: NEXT_PUBLIC_WS_URL
        value: wss://samson-backend.onrender.com/ws
      - key: NEXT_PUBLIC_API_HOST
        value: samson-backend.onrender.com
